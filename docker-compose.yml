version: "3.9"

services:
  # ─── Pipeline Server ──────────────────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    ports:
      - "8000:8000"
    environment:
      - SPECTRE_DEMO_MODE=true
      - SPECTRE_API_HOST=0.0.0.0
      - SPECTRE_API_PORT=8000
      - SPECTRE_PQ_ENABLED=true
      - SPECTRE_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Next.js Dashboard ───────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      pipeline:
        condition: service_healthy
    restart: unless-stopped
